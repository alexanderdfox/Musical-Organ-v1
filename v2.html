<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Sacred Heart Pipe Organ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:wght@700&display=swap');

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            min-height: 100dvh;
            background: radial-gradient(circle at center, #2a0a0a, #0a0a1f);
            font-family: 'Cinzel', serif;
            color: #ffd700;
            touch-action: manipulation;
            overflow-y: auto;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 20px 12px 40px;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.4rem, 9vw, 3.4rem);
            margin: 10px 0 8px;
            text-shadow: 0 0 30px #ff3333, 0 0 60px #ffd700;
            letter-spacing: 4px;
        }

        .subtitle {
            font-size: 1.05rem;
            margin-bottom: 25px;
            opacity: 0.9;
            font-style: italic;
        }

        #canvas {
            width: 100%;
            max-width: 920px;
            height: auto;
            border: 10px solid #4a2c0f;
            border-image: linear-gradient(#ffd700, #b8860b) 1;
            border-radius: 18px;
            box-shadow: 0 0 0 12px #1a0f00, 
                        0 0 70px rgba(255, 80, 80, 0.65),
                        inset 0 0 60px rgba(255, 215, 0, 0.2);
            background: #0f0505;
            display: block;
            margin: 0 auto 25px;
            touch-action: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        button {
            background: linear-gradient(#8b0000, #4a0000);
            color: #ffd700;
            border: 3px solid #ffd700;
            padding: 14px 22px;
            font-family: 'Cinzel', serif;
            font-size: 1.02rem;
            cursor: pointer;
            box-shadow: 0 6px 0 #2a0000;
            transition: all 0.1s;
            min-width: 130px;
            border-radius: 6px;
            touch-action: manipulation;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2a0000;
        }

        .import-section {
            background: rgba(0,0,0,0.45);
            border-radius: 14px;
            padding: 18px;
            margin: 20px auto;
            max-width: 720px;
        }

        textarea {
            width: 100%;
            height: 110px;
            background: #1a0f00;
            color: #ffd700;
            border: 2px solid #b8860b;
            font-family: monospace;
            padding: 12px;
            font-size: 0.95rem;
            border-radius: 6px;
            resize: vertical;
        }

        .info {
            margin-top: 25px;
            font-size: 0.88rem;
            opacity: 0.85;
            line-height: 1.6;
            padding: 0 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>COR JESU</h1>
        <div class="subtitle">The Immaculate Heart Pipe Organ</div>
        
        <canvas id="canvas" width="920" height="620"></canvas>
        
        <div class="controls">
            <button id="chord">CHORD</button>
            <button id="corjesu">COR JESU</button>
            <button id="avemaria">AVE MARIA</button>
            <button id="tantum">TANTUM ERGO</button>
            <button id="panis">PANIS ANGELICUS</button>
            <button id="amazing">AMAZING GRACE</button>
            <button id="stop">STOP</button>
            <button id="reset">RESET</button>
        </div>

        <div class="import-section">
            <strong>Custom Melody (one note per line)</strong>
            <textarea id="custom-input" placeholder="C4 800&#10;E4 600&#10;G4 1200&#10;A4 800"></textarea>
            
            <div style="margin-top:12px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
                <button id="play-custom">▶ PLAY CUSTOM</button>
                <label style="cursor:pointer; background:#4a0000; color:#ffd700; border:3px solid #ffd700; padding:14px 26px; border-radius:6px;">
                    📤 Import MIDI File
                    <input type="file" id="midi-upload" accept=".mid,.midi" style="display:none;">
                </label>
            </div>
        </div>
        
        <div class="info">
            Tap or drag the keys • Sacred organ sound with natural sustain<br>
            All hymn buttons now play complete, reverent versions
        </div>
    </div>

    <script src="midi-parser.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        
        let heartX = canvas.width / 2;
        let heartY = 260;
        let heartScale = 1;
        let flameIntensity = 0;
        let pipes = [];
        let keys = [];
        
        let audioContext;
        let isPlayingSong = false;
        let songTimeoutIds = [];
        
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') audioContext.resume();
        }
        
        function playNote(freq, duration = 800, velocity = 0.65) {
            if (!audioContext) return;
            const now = audioContext.currentTime;
            
            const osc1 = audioContext.createOscillator(); osc1.type = 'sawtooth'; osc1.frequency.value = freq;
            const osc2 = audioContext.createOscillator(); osc2.type = 'sine'; osc2.frequency.value = freq * 2;
            
            const gain = audioContext.createGain();
            const filter = audioContext.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 2100;
            
            gain.gain.setValueAtTime(0.001, now);
            gain.gain.linearRampToValueAtTime(velocity, now + 0.09);
            gain.gain.linearRampToValueAtTime(velocity * 0.55, now + duration / 1000 * 0.75);
            gain.gain.linearRampToValueAtTime(0.001, now + duration / 1000);
            
            osc1.connect(filter); osc2.connect(filter);
            filter.connect(gain); gain.connect(audioContext.destination);
            
            osc1.start(now); osc2.start(now);
            osc1.stop(now + duration / 1000 + 0.2);
            osc2.stop(now + duration / 1000 + 0.2);
        }
        
        const noteToFreq = (noteStr) => {
            const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
            const match = noteStr.match(/^([A-G]#?)(\d+)$/i);
            if (!match) return 440;
            const [, name, octave] = match;
            const semitone = notes.indexOf(name.toUpperCase()) + (parseInt(octave) - 4) * 12 + 9;
            return 440 * Math.pow(2, semitone / 12);
        };
        
        function playChord() {
            initAudio();
            const base = 261.63;
            const chord = [base, base*1.26, base*1.5, base*1.68];
            chord.forEach((f,i) => setTimeout(() => playNote(f, 1800, 0.6), i*40));
            flameIntensity = 1.9;
        }
        
        function playSong(notes) {
            if (isPlayingSong || !notes.length) return;
            initAudio();
            isPlayingSong = true;
            const useAbs = typeof notes[0].startTime === 'number';
            if (useAbs) {
                let maxEnd = 0;
                notes.forEach(note => {
                    const v = note.velocity != null ? note.velocity : 0.68;
                    const id = setTimeout(() => {
                        playNote(note.freq, note.duration, v);
                        flameIntensity = Math.min(2.5, flameIntensity + 0.7);
                        if (pipes.length) pipes[Math.floor(Math.random()*pipes.length)].glow = 1.5;
                    }, note.startTime);
                    songTimeoutIds.push(id);
                    maxEnd = Math.max(maxEnd, note.startTime + note.duration);
                });
                songTimeoutIds.push(setTimeout(() => { isPlayingSong = false; }, maxEnd + 800));
            } else {
                let time = 0;
                notes.forEach(note => {
                    const id = setTimeout(() => {
                        playNote(note.freq, note.duration, 0.68);
                        flameIntensity = Math.min(2.5, flameIntensity + 0.7);
                        if (pipes.length) pipes[Math.floor(Math.random()*pipes.length)].glow = 1.5;
                    }, time);
                    songTimeoutIds.push(id);
                    time += note.duration * 0.93;
                });
                songTimeoutIds.push(setTimeout(() => { isPlayingSong = false; }, time + 800));
            }
        }

        // ==================== FULLER SACRED HYMN VERSIONS ====================
        const hymns = {
            corjesu: [
                {freq:261.63, duration:700}, {freq:329.63, duration:700}, {freq:392.00, duration:1100},
                {freq:329.63, duration:500}, {freq:261.63, duration:1400},
                {freq:440.00, duration:700}, {freq:392.00, duration:700}, {freq:329.63, duration:1100},
                {freq:392.00, duration:500}, {freq:523.25, duration:1400},
                {freq:392.00, duration:900}, {freq:329.63, duration:900}, {freq:261.63, duration:1800}
            ],
            avemaria: [
                {freq:523.25, duration:900}, {freq:587.33, duration:450}, {freq:659.25, duration:1350},
                {freq:698.46, duration:700}, {freq:659.25, duration:700}, {freq:587.33, duration:900},
                {freq:523.25, duration:450}, {freq:659.25, duration:1350}, {freq:784.00, duration:900},
                {freq:880.00, duration:700}, {freq:784.00, duration:1600},
                {freq:659.25, duration:800}, {freq:523.25, duration:1800}
            ],
            tantum: [
                {freq:392.00, duration:900}, {freq:523.25, duration:900}, {freq:659.25, duration:1800},
                {freq:587.33, duration:900}, {freq:523.25, duration:900}, {freq:392.00, duration:900},
                {freq:523.25, duration:900}, {freq:659.25, duration:1800}, {freq:587.33, duration:900},
                {freq:523.25, duration:900}, {freq:392.00, duration:2400}
            ],
            panis: [
                {freq:261.63, duration:1400}, {freq:329.63, duration:700}, {freq:392.00, duration:700},
                {freq:523.25, duration:2000}, {freq:440.00, duration:700}, {freq:392.00, duration:1400},
                {freq:329.63, duration:700}, {freq:261.63, duration:2200}
            ],
            amazing: [
                {freq:392.00, duration:900}, {freq:440.00, duration:900}, {freq:523.25, duration:1800},
                {freq:392.00, duration:900}, {freq:329.63, duration:900}, {freq:392.00, duration:900},
                {freq:523.25, duration:900}, {freq:440.00, duration:900}, {freq:392.00, duration:2400}
            ]
        };
        
        function playCorJesu()     { stopSong(); playSong(hymns.corjesu); }
        function playAveMaria()    { stopSong(); playSong(hymns.avemaria); }
        function playTantumErgo()  { stopSong(); playSong(hymns.tantum); }
        function playPanisAngelicus(){ stopSong(); playSong(hymns.panis); }
        function playAmazingGrace(){ stopSong(); playSong(hymns.amazing); }
        
        function stopSong() {
            songTimeoutIds.forEach(clearTimeout);
            songTimeoutIds = [];
            isPlayingSong = false;
        }

        // Visual functions (same as previous optimized version)
        function initPipes() {
            pipes = [];
            const num = 13;
            const startX = heartX - 280;
            for (let i = 0; i < num; i++) {
                const x = startX + i * 45;
                const height = 170 + Math.abs(i - num/2) * -28 + Math.random() * 35;
                pipes.push({x, height, glow: 0});
            }
        }
        
        function initKeys() {
            keys = [];
            const numKeys = 14;
            const baseY = 480;
            for (let i = 0; i < numKeys; i++) {
                const offset = (i - numKeys/2) * 0.6;
                keys.push({
                    x: heartX - 260 + i * 38,
                    y: baseY + offset * 12,
                    width: 32,
                    height: 92,
                    pressed: false,
                    freq: 220 * Math.pow(2, (i - 5) / 12)
                });
            }
        }
        
        function drawSacredHeart() {
            ctx.save();
            ctx.translate(heartX, heartY);
            ctx.scale(heartScale, heartScale);
            
            ctx.fillStyle = '#8b0000';
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 18;
            ctx.beginPath();
            ctx.moveTo(0,80);
            ctx.bezierCurveTo(-110,-40,-140,60,0,160);
            ctx.bezierCurveTo(140,60,110,-40,0,80);
            ctx.fill(); ctx.stroke();
            
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.moveTo(0,95);
            ctx.bezierCurveTo(-85,10,-105,75,0,135);
            ctx.bezierCurveTo(105,75,85,10,0,95);
            ctx.fill();
            
            ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 12;
            ctx.beginPath(); ctx.arc(0,35,95,Math.PI*0.7,Math.PI*2.3); ctx.stroke();
            
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(-12,-68,24,58);
            ctx.fillRect(-36,-50,72,18);
            
            ctx.strokeStyle = '#4a0000'; ctx.lineWidth = 9;
            ctx.beginPath(); ctx.moveTo(55,95); ctx.lineTo(88,128); ctx.stroke();
            
            ctx.fillStyle = `rgba(255,${100 + flameIntensity*80},20,${0.7 + flameIntensity*0.3})`;
            for (let i = 0; i < 6; i++) {
                const fx = -38 + i * 13;
                ctx.beginPath();
                ctx.ellipse(fx, -30 - flameIntensity*22, 19 + i*1.5, 48 + flameIntensity*32, 0, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.restore();
        }
        
        function drawPipes() {
            pipes.forEach(p => {
                const g = Math.max(0, p.glow);
                ctx.fillStyle = '#c0c0c0';
                ctx.fillRect(p.x-14, heartY-p.height-42, 28, p.height);
                ctx.fillStyle = '#b8860b';
                ctx.fillRect(p.x-18, heartY-p.height-58, 36, 24);
                ctx.fillStyle = `rgba(255,255,200,${0.5+g})`;
                ctx.fillRect(p.x-11, heartY-p.height-48, 9, p.height);
                p.glow *= 0.89;
            });
        }
        
        function drawKeys() {
            keys.forEach(k => {
                ctx.save();
                ctx.translate(k.x, k.y);
                ctx.fillStyle = k.pressed ? '#4a0000' : '#eee';
                ctx.fillRect(-k.width/2, -k.height/2, k.width, k.height);
                ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 4;
                ctx.strokeRect(-k.width/2+4, -k.height/2+4, k.width-8, k.height-8);
                ctx.restore();
            });
        }
        
        function drawFrame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const grad = ctx.createRadialGradient(heartX, heartY+80, 120, heartX, heartY+320, 520);
            grad.addColorStop(0, 'rgba(255,90,90,0.14)');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawPipes();
            drawSacredHeart();
            drawKeys();
            
            heartScale = 1 + Math.sin(Date.now() / 920) * 0.013;
            flameIntensity = Math.max(0, flameIntensity * 0.87);
        }
        
        function animate() {
            drawFrame();
            requestAnimationFrame(animate);
        }
        
        // Touch & Mouse
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
        }
        
        function handleStart(e) {
            e.preventDefault();
            initAudio();
            const pos = getPos(e);
            keys.forEach(key => {
                if (Math.abs(pos.x - key.x) < key.width/2 + 10 && Math.abs(pos.y - key.y) < key.height/2 + 15) {
                    key.pressed = true;
                    playNote(key.freq, 1350, 0.72);
                    flameIntensity = 1.35;
                    if (pipes.length) pipes[Math.floor(Math.random()*pipes.length)].glow = 1.4;
                }
            });
        }
        
        function handleEnd() {
            keys.forEach(k => k.pressed = false);
        }
        
        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchend', handleEnd);
        
        // Button connections
        document.getElementById('chord').onclick = () => { initAudio(); playChord(); };
        document.getElementById('corjesu').onclick = playCorJesu;
        document.getElementById('avemaria').onclick = playAveMaria;
        document.getElementById('tantum').onclick = playTantumErgo;
        document.getElementById('panis').onclick = playPanisAngelicus;
        document.getElementById('amazing').onclick = playAmazingGrace;
        document.getElementById('stop').onclick = stopSong;
        document.getElementById('reset').onclick = () => {
            stopSong();
            flameIntensity = 0;
            keys.forEach(k => k.pressed = false);
            pipes.forEach(p => p.glow = 0);
        };
        
        document.getElementById('play-custom').onclick = () => {
            stopSong();
            const lines = document.getElementById('custom-input').value.trim().split('\n');
            const melody = [];
            lines.forEach(line => {
                const parts = line.trim().split(/\s+/);
                if (parts.length >= 2) {
                    const freq = noteToFreq(parts[0]);
                    const dur = parseFloat(parts[1]) || 800;
                    if (freq) melody.push({freq, duration: dur});
                }
            });
            if (melody.length) playSong(melody);
        };
        
        document.getElementById('midi-upload').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            try {
                const buf = await file.arrayBuffer();
                if (typeof parseMidiFile !== 'function') {
                    alert('MIDI parser not loaded (midi-parser.js).');
                    return;
                }
                const melody = parseMidiFile(buf);
                if (melody.length) {
                    stopSong();
                    playSong(melody);
                } else alert("No notes found in MIDI file.");
            } catch(err) {
                alert("Could not read MIDI file.");
            }
            e.target.value = '';
        };
        
        // Initialize
        initPipes();
        initKeys();
        animate();
        
        console.log('%c❤️ Sacred Heart Pipe Organ – All hymns now play full versions', 'color:#ff5555; font-family:serif');
    </script>
</body>
</html>
